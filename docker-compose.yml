services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - bookmarks-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

volumes:
  bookmarks-data:
